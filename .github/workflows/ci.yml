name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/**
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  verify-static-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Azure-style static bundle
        run: bash scripts/prepare-azure-static.sh

      - name: Assert bundle artifacts
        run: |
          test -f swa-output/index.html
          test -f swa-output/cv-v2.html
          test -f swa-output/js/cv-v2-layers.js
