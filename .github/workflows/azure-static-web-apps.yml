# Deploy cv-v2 static bundle to Azure Static Web Apps.
# Prerequisites:
# 1. Azure Portal → Create "Static Web App" → Deployment details: GitHub (this repo).
# 2. Copy the deployment token from Azure (or let the wizard create this workflow).
# 3. Repo → Settings → Secrets → Actions → AZURE_STATIC_WEB_APPS_API_TOKEN

name: Azure Static Web Apps — CV v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build static bundle and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static bundle
        run: bash scripts/prepare-azure-static.sh

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: swa-output
          api_location: ""
          skip_app_build: true
